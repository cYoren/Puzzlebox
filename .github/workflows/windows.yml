name: Windows Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows MSIX
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create MSIX
        run: flutter pub run msix:create

      - name: Upload MSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-games-windows-msix
          path: build/windows/x64/runner/release/*.msix

      - name: Create Portable Zip
        run: |
          powershell Compress-Archive -Path build/windows/x64/runner/release/* -DestinationPath build/windows/x64/runner/release/puzzle-games-windows-portable.zip
        shell: pwsh

      - name: Upload Windows Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-games-windows-portable
          path: build/windows/x64/runner/release/puzzle-games-windows-portable.zip

      - name: Build Installer (Inno Setup)
        run: |
          $pubspec = Get-Content pubspec.yaml | ConvertFrom-StringData
          $version = (Get-Content pubspec.yaml | Select-String "^version: ").ToString().Split(":")[1].Trim().Split("+")[0]
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version windows/runner/installer_script.iss
        shell: pwsh

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-games-windows-setup
          path: build/windows/x64/runner/release/installer/*.exe
