name: Windows Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows MSIX
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create MSIX
        run: flutter pub run msix:create

      - name: Upload MSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: puzzlebox-windows-msix
          path: build/windows/x64/runner/release/*.msix

      - name: Create Portable Zip
        run: |
          powershell Compress-Archive -Path build/windows/x64/runner/release/* -DestinationPath build/windows/x64/runner/release/puzzlebox-windows-portable.zip
        shell: pwsh

      - name: Upload Windows Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: puzzlebox-windows-portable
          path: build/windows/x64/runner/release/puzzlebox-windows-portable.zip

      - name: Build Installer (Inno Setup)
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' | Select-Object -First 1
          if (-not $versionLine) { throw "No version found in pubspec.yaml" }
          $version = $versionLine.Matches[0].Groups[1].Value.Trim().Split("+")[0]
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" windows/runner/installer_script.iss
        shell: pwsh

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: puzzlebox-windows-setup
          path: build/windows/x64/runner/release/installer/*.exe
