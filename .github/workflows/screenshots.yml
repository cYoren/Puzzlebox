name: Store Screenshots

# Captures the curated hero screenshots on an Android emulator and uploads
# them (raw + store-framed) as build artifacts.
# Run manually from the Actions tab, or on demand by pushing to main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "integration_test/**"
      - "test_driver/**"
      - "tool/frame_screenshots.py"
      - ".github/workflows/screenshots.yml"

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Pillow (for framing)
        run: pip install --quiet pillow

      - name: Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Capture + frame screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            flutter drive \
              --driver=test_driver/integration_test.dart \
              --target=integration_test/screenshot_test.dart \
              -d emulator-5554
            python3 tool/frame_screenshots.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: puzzlebox-screenshots
          path: |
            screenshots/raw/**
            screenshots/store/**
          if-no-files-found: warn
