name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Flutter Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache build runner
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool/build
          key: build-runner-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}-${{ hashFiles('lib/**/*.dart') }}-${{ hashFiles('lib/l10n/*.arb') }}
          restore-keys: |
            build-runner-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}-
            build-runner-${{ runner.os }}-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Flutter dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify generated files are current
        run: |
          git diff --exit-code -- lib

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android debug APK
        run: flutter build apk --debug
